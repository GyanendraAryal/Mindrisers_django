{% extends "base.html" %}
{% block title %} Index Page {% endblock title %}
{% load static %}

{% block body %}
<style>
  /* Target the images directly inside the carousel items */
  .carousel-item img {
    height: 500px;         /* Set your preferred fixed desktop height here */
    object-fit: cover;     /* Crops image proportionally instead of squeezing it */
  }

  /* Responsive adjustment for small mobile screens */
  @media (max-width: 768px) {
    .carousel-item img {
      height: 300px;       /* Shorter height for mobile screens */
    }
  }
</style> <!-- This closing tag fixes the blank page issue -->

<div class="container my-4">
  <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="{% static 'images/hero1.png' %}" class="d-block w-100" alt="Hero 1" />
      </div>
      <div class="carousel-item">
        <img src="{% static 'images/hero2.png' %}" class="d-block w-100" alt="Hero 2" />
      </div>
      <div class="carousel-item">
        <img src="{% static 'images/hero3.png' %}" class="d-block w-100" alt="Hero 3" />
      </div>
    </div>
    <button
      class="carousel-control-prev"
      type="button"
      data-bs-target="#carouselExample"
      data-bs-slide="prev"
    >
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button
      class="carousel-control-next"
      type="button"
      data-bs-target="#carouselExample"
      data-bs-slide="next"
    >
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>
{% endblock body %}
